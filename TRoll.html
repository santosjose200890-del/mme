<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Surpresa 😈</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(45deg, #111, #333);
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #botao {
      padding: 20px 40px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      cursor: pointer;
      transition: 0.3s;
      position: absolute;
    }

    #botao:hover {
      transform: scale(1.2);
      background: #ff0066;
      color: white;
    }

    #mensagem {
      display: none;
      font-size: 40px;
      text-align: center;
      animation: piscar 0.5s infinite;
    }

    @keyframes piscar {
      0% {opacity: 1;}
      50% {opacity: 0;}
      100% {opacity: 1;}
    }
  </style>
</head>
<body>

<button id="botao">CLIQUE AQUI 😏</button>
<h1 id="mensagem">Tua mãe nasceu pelada</h1>

<audio id="som" src="https://www.myinstants.com/media/sounds/troll-song.mp3"></audio>

<script>
  const botao = document.getElementById("botao");
  const mensagem = document.getElementById("mensagem");
  const som = document.getElementById("som");

  // Botão foge do mouse
  botao.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 50);
    botao.style.left = x + "px";
    botao.style.top = y + "px";
  });

  // Se clicar (milagre kkk)
  botao.addEventListener("click", () => {
    botao.style.display = "none";
    mensagem.style.display = "block";
    som.play();

    // Tela piscando
    setInterval(() => {
      document.body.style.background = 
        `rgb(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255})`;
    }, 100);
  });
</script>

</body>
</html>
